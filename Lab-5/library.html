<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library Book Tracker - AJAX XML</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#4e73df,#1cc88a);
  min-height:100vh;
  padding:20px;
}

.container {
  max-width:1000px;
  margin:auto;
  background:white;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

.header {
  background:linear-gradient(135deg,#ff7eb3,#ff758c);
  color:white;
  padding:25px;
  text-align:center;
}

.section { padding:25px; }

input, select {
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:1px solid #ccc;
  width:180px;
}

button {
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
  margin:5px;
  transition:0.3s;
}

.btn-primary { background:#1cc88a; color:white; }
.btn-warning { background:#f6c23e; color:white; }
.btn-danger { background:#e74a3b; color:white; }
.btn-info { background:#4e73df; color:white; }

button:hover { opacity:0.85; }

table {
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th, td {
  padding:12px;
  border-bottom:1px solid #eee;
  text-align:center;
}

th { background:#f8f9fc; }

.status {
  margin-top:15px;
  font-weight:600;
}

.success { color:green; }
.error { color:red; }
.loading { color:#f6c23e; }

.empty {
  text-align:center;
  padding:20px;
  color:#777;
}
</style>
</head>

<body>

<div class="container">
  <div class="header">
    <h1>📚 Library Book Tracker</h1>
    <p>AJAX + XML DOM Manipulation</p>
  </div>

  <div class="section">

    <button class="btn-info" onclick="loadBooks()">Load Books</button>

    <h3 style="margin-top:20px;">Add / Update Book</h3>

    <input type="text" id="bookId" placeholder="Book ID">
    <input type="text" id="bookTitle" placeholder="Title">
    <input type="text" id="bookAuthor" placeholder="Author">

    <select id="bookStatus">
      <option value="">Select Status</option>
      <option>Available</option>
      <option>Not Available</option>
    </select>

    <br>

    <button class="btn-primary" onclick="addBook()">Add Book</button>
    <button class="btn-warning" onclick="updateStatus()">Update Status</button>

    <div id="statusMessage" class="status"></div>

    <table id="bookTable">
      <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Author</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </table>

  </div>
</div>

<script>

let xmlDoc;

// ================= LOAD XML =================
function loadBooks() {

  showStatus("Loading books...", "loading");

  const xhr = new XMLHttpRequest();
  xhr.open("GET", "books.xml", true);

  xhr.onload = function() {
    if (xhr.status === 200) {
      xmlDoc = xhr.responseXML;

      if (!xmlDoc) {
        showStatus("Malformed XML file!", "error");
        return;
      }

      displayBooks();
      showStatus("Books loaded successfully!", "success");
    } else {
      showStatus("Error loading XML file.", "error");
    }
  };

  xhr.onerror = function() {
    showStatus("Network error occurred.", "error");
  };

  xhr.send();
}

// ================= DISPLAY =================
function displayBooks() {

  const table = document.getElementById("bookTable");

  table.innerHTML = `
    <tr>
      <th>ID</th>
      <th>Title</th>
      <th>Author</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  `;

  const books = xmlDoc.getElementsByTagName("book");

  if (books.length === 0) {
    table.innerHTML += `<tr><td colspan="5" class="empty">No Books Found</td></tr>`;
    return;
  }

  for (let i = 0; i < books.length; i++) {

    const id = books[i].getElementsByTagName("id")[0].textContent;
    const title = books[i].getElementsByTagName("title")[0].textContent;
    const author = books[i].getElementsByTagName("author")[0].textContent;
    const status = books[i].getElementsByTagName("status")[0].textContent;

    table.innerHTML += `
      <tr>
        <td>${id}</td>
        <td>${title}</td>
        <td>${author}</td>
        <td>${status}</td>
        <td>
          <button class="btn-danger" onclick="deleteBook(${i})">Delete</button>
        </td>
      </tr>
    `;
  }
}

// ================= ADD BOOK =================
function addBook() {

  if (!xmlDoc) return showStatus("Load XML first!", "error");

  const id = bookId.value.trim();
  const title = bookTitle.value.trim();
  const author = bookAuthor.value.trim();
  const status = bookStatus.value;

  if (!id || !title || !author || !status)
    return showStatus("All fields are required!", "error");

  // Check duplicate ID
  const books = xmlDoc.getElementsByTagName("book");
  for (let i = 0; i < books.length; i++) {
    if (books[i].getElementsByTagName("id")[0].textContent === id)
      return showStatus("Book ID already exists!", "error");
  }

  const newBook = xmlDoc.createElement("book");

  newBook.appendChild(createNode("id", id));
  newBook.appendChild(createNode("title", title));
  newBook.appendChild(createNode("author", author));
  newBook.appendChild(createNode("status", status));

  xmlDoc.documentElement.appendChild(newBook);

  displayBooks();
  showStatus("Book added successfully (temporary).", "success");
}

// ================= UPDATE STATUS =================
function updateStatus() {

  const id = bookId.value.trim();
  const status = bookStatus.value;

  if (!id || !status)
    return showStatus("Provide Book ID and Status!", "error");

  const books = xmlDoc.getElementsByTagName("book");

  for (let i = 0; i < books.length; i++) {

    if (books[i].getElementsByTagName("id")[0].textContent === id) {
      books[i].getElementsByTagName("status")[0].textContent = status;
      displayBooks();
      showStatus("Availability updated successfully!", "success");
      return;
    }
  }

  showStatus("Book not found!", "error");
}

// ================= DELETE =================
function deleteBook(index) {

  const books = xmlDoc.getElementsByTagName("book");
  xmlDoc.documentElement.removeChild(books[index]);

  displayBooks();
  showStatus("Book deleted successfully!", "success");
}

// ================= HELPER =================
function createNode(tag, value) {
  const node = xmlDoc.createElement(tag);
  node.appendChild(xmlDoc.createTextNode(value));
  return node;
}

function showStatus(message, type) {
  const status = document.getElementById("statusMessage");
  status.innerText = message;
  status.className = "status " + type;
}

</script>

</body>
</html>
