<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AJAX-Based Product Search System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      color: #333;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 15px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #FF6B6B 0%, #4ECDC4 100%);
      color: white;
      padding: 25px;
      text-align: center;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 5px;
    }

    .header p {
      opacity: 0.9;
      font-size: 14px;
    }

    .search-container {
      padding: 25px 30px 20px 30px;
      border-bottom: 1px solid #e1e8ed;
      background: #f8f9fa;
    }

    .search-label {
      font-weight: 600;
      margin-bottom: 8px;
      display: block;
      font-size: 14px;
      color: #333;
    }

    .search-input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #searchInput {
      flex: 1;
      padding: 12px 15px 12px 40px;
      border: 2px solid #e1e8ed;
      border-radius: 999px;
      font-size: 16px;
      transition: all 0.3s ease;
      background: white;
    }

    #searchInput:focus {
      outline: none;
      border-color: #4ECDC4;
      box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.15);
    }

    .search-icon {
      position: absolute;
      left: 14px;
      font-size: 16px;
      color: #888;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #555;
      background: #e1e8ed;
    }

    .status-badge {
      margin-left: 10px;
    }

    .badge-info {
      background: #e8f5e8;
      color: #2e7d32;
    }

    .badge-error {
      background: #ffeaea;
      color: #c0392b;
    }

    .badge-loading {
      background: #fff3cd;
      color: #856404;
    }

    .results-container {
      padding: 20px 30px 30px 30px;
    }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      font-size: 14px;
      color: #666;
    }

    .results-count {
      font-weight: 600;
    }

    .results-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 15px;
    }

    .product-card {
      border-radius: 10px;
      border: 1px solid #e1e8ed;
      padding: 15px;
      background: #ffffff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .product-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      border-color: #4ECDC4;
    }

    .product-name {
      font-size: 16px;
      font-weight: 600;
      color: #333;
    }

    .product-category {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: #f0f2f5;
      color: #555;
      width: fit-content;
    }

    .product-price {
      font-size: 18px;
      font-weight: 700;
      color: #4ECDC4;
    }

    .product-meta {
      font-size: 12px;
      color: #888;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 4px;
    }

    .no-results,
    .error-message,
    .helper-message {
      text-align: center;
      padding: 30px 10px;
      color: #666;
      font-size: 14px;
    }

    .no-results strong {
      display: block;
      font-size: 16px;
      margin-bottom: 5px;
    }

    .loading-indicator {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #856404;
      background: #fff3cd;
      padding: 6px 10px;
      border-radius: 999px;
    }

    .loading-spinner {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid #f39c12;
      border-top-color: transparent;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .container {
        margin: 10px;
      }

      .search-container,
      .results-container {
        padding: 20px;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <div class="header">
    <h1>🛍️ Live Product Search</h1>
    <p>Search products with real-time results using AJAX and JSON</p>
  </div>

  <!-- Search Section -->
  <div class="search-container">
    <label for="searchInput" class="search-label">
      Search Products
      <span class="badge">AJAX + JSON</span>
      <span class="badge badge-info status-badge" id="statusBadge">Idle</span>
    </label>
    <div class="search-input-wrapper">
      <span class="search-icon">🔍</span>
      <input
        type="text"
        id="searchInput"
        placeholder="Type a product name or category (e.g., iPhone, laptop, audio, gaming)..."
        autocomplete="off"
      >
    </div>
  </div>

  <!-- Results Section -->
  <div class="results-container">
    <div class="results-header">
      <span class="results-count" id="resultsCount">Showing all products</span>
      <span id="loadingIndicator" style="display: none;" class="loading-indicator">
        <span class="loading-spinner"></span>
        Loading results...
      </span>
    </div>

    <div id="resultsArea">
      <div class="helper-message">
        Start typing to search products by <strong>name</strong> or <strong>category</strong>.
        Results will appear here in real time.
      </div>
    </div>
  </div>
</div>

<script>
  const searchInput = document.getElementById('searchInput');
  const resultsArea = document.getElementById('resultsArea');
  const resultsCount = document.getElementById('resultsCount');
  const loadingIndicator = document.getElementById('loadingIndicator');
  const statusBadge = document.getElementById('statusBadge');

  let allProducts = [];
  let searchTimeout;
  let isLoading = false;

  // 1️⃣ Fetch products JSON (simulated server) with error handling
  async function fetchProducts() {
    setLoading(true, 'Loading products...');
    try {
      const response = await fetch('products.json', { cache: 'no-store' });
      if (!response.ok) {
        throw new Error('Failed to load products.json');
      }
      const data = await response.json();
      allProducts = data.products || [];
      setLoading(false);

      // Initial render: show all products
      renderResults(allProducts, '');
    } catch (error) {
      console.error('Error loading products:', error);
      setLoading(false);
      showError('Unable to load products. Please check the JSON file or try again later.');
    }
  }

  // 2️⃣ Debounced search handler
  function handleSearchInput(event) {
    const query = event.target.value.trim();

    // Clear previous debounce timer
    clearTimeout(searchTimeout);

    // If empty, show all products (or helper if not loaded yet)
    if (query === '') {
      if (allProducts.length > 0) {
        renderResults(allProducts, '');
      } else {
        resultsArea.innerHTML = '<div class="helper-message">Start typing to search products by <strong>name</strong> or <strong>category</strong>.</div>';
        resultsCount.textContent = 'Showing all products';
      }
      setStatus('Idle', 'info');
      return;
    }

    // Debounce actual filtering / AJAX by 400ms
    setStatus('Typing...', 'info');
    searchTimeout = setTimeout(() => {
      performSearch(query);
    }, 400);
  }

  // 3️⃣ Perform search on local JSON data (simulating server search)
  function performSearch(query) {
    if (!allProducts || allProducts.length === 0) {
      showError('Products not loaded yet. Please wait a moment and try again.');
      return;
    }

    setLoading(true, 'Searching...');

    // Simulate small network delay to mimic server call
    setTimeout(() => {
      const lowerQuery = query.toLowerCase();

      const filtered = allProducts.filter(product => {
        const nameMatch = product.name.toLowerCase().includes(lowerQuery);
        const categoryMatch = product.category.toLowerCase().includes(lowerQuery);
        return nameMatch || categoryMatch;
      });

      setLoading(false);

      renderResults(filtered, query);
    }, 300);
  }

  // 4️⃣ Render results dynamically into DOM
  function renderResults(products, query) {
    if (!products || products.length === 0) {
      const safeQuery = query ? query.replace(/</g, '&lt;').replace(/>/g, '&gt;') : '';
      resultsArea.innerHTML = `
        <div class="no-results">
          <strong>No results found</strong>
          ${safeQuery ? `We couldn't find any products matching "<em>${safeQuery}</em>".` : 'Try searching by product name or category.'}
        </div>
      `;

      resultsCount.textContent = '0 results';
      setStatus('No results', 'error');
      return;
    }

    const cardsHtml = products.map(product => {
      const price = Number(product.price).toLocaleString(undefined, {
        style: 'currency',
        currency: 'USD'
      });

      return `
        <div class="product-card">
          <div class="product-name">${product.name}</div>
          <span class="product-category">${product.category}</span>
          <div class="product-price">${price}</div>
          <div class="product-meta">
            <span>ID: ${product.id}</span>
            <span>${new Date().getFullYear()}</span>
          </div>
        </div>
      `;
    }).join('');

    resultsArea.innerHTML = `<div class="results-list">${cardsHtml}</div>`;

    if (query && query.trim() !== '') {
      resultsCount.textContent = `${products.length} result(s) for "${query}"`;
    } else {
      resultsCount.textContent = `Showing all ${products.length} products`;
    }

    setStatus('Results updated', 'info');
  }

  // 5️⃣ Helper UI functions
  function setLoading(loading, message) {
    isLoading = loading;
    loadingIndicator.style.display = loading ? 'inline-flex' : 'none';
    if (loading && message) {
      loadingIndicator.lastChild.textContent = message;
      setStatus('Loading...', 'loading');
    } else if (!loading) {
      setStatus('Idle', 'info');
    }
  }

  function showError(message) {
    resultsArea.innerHTML = `
      <div class="error-message">
        ⚠️ ${message}
      </div>
    `;
    resultsCount.textContent = 'Error';
    setStatus('Error', 'error');
  }

  function setStatus(text, type) {
    statusBadge.textContent = text;
    statusBadge.className = 'badge status-badge';
    if (type === 'error') {
      statusBadge.classList.add('badge-error');
    } else if (type === 'loading') {
      statusBadge.classList.add('badge-loading');
    } else {
      statusBadge.classList.add('badge-info');
    }
  }

  // 6️⃣ Event listeners
  searchInput.addEventListener('input', handleSearchInput);

  // Initialize
  fetchProducts();
</script>

</body>
</html>
